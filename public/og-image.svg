  <!-- Dollar sign -->
  <text x="150" y="450" font-size="200" font-weight="bold" fill="white" font-family="Arial, sans-serif">$</text>

  <!-- Title -->
  <text x="600" y="200" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Real Cost of Living</text>

  <!-- Subtitle -->
